# Prefix
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane + Split
unbind %
bind - split-window -h
unbind '"'
bind _ split-window -v
bind x kill-window

# Vim-style pane navigation (prefix + h/j/k/l)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane navigation with Ctrl + Alt + Arrow keys
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Resize panes with Ctrl + Alt + Shift + Arrow keys
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Select window with Alt + Number keys
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Window navigation with Alt + Arrow keys
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1

# Swap windows with Alt + Shift + Arrow keys
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Sessions
bind X kill-session
bind P switch-client -p # Switch to previous session
bind N switch-client -n # Switch to next session

bind -n M-Up switch-client -p # Swap with previous session
bind -n M-Down switch-client -n # Swap with next session

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on # Enable Mouse
set -g base-index 1 # Windows numbers start at 1
set -g pane-base-index 1 # Pane numbers start at 1
set -g renumber-windows on # re-number all windows when any is closed
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on 
set -g set-clipboard on # Copy to system clipboard in tmux
set -g allow-passthrough on
setw -g aggressive-resize on 
set -g detach-on-destroy off # Don't destroy session when detaching

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Commands
bind-key -r g run-shell "tmux neww lazygit" # Open lazygit in a new window
bind-key -r D run-shell "tmux neww lazydocker" # Open lazygit in a new window
bind-key -r f run-shell "tmux neww ~/.config/tmux/tmux-sessionizer" # Open tmux-sessionizer when <prefix> + f is pressed

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,} #[fg=brightblack]#(tmux display-message -p -F '#{pane_current_path}')"
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue